<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zugangscode eingeben</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #ffffff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: #1a1a1a;
            overflow: hidden;
        }

        /* --- LOADING SCREEN --- */
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }

        .spinner-large {
            width: 40px; height: 40px;
            border: 4px solid rgba(88, 101, 242, 0.1);
            border-top: 4px solid #5865F2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { font-size: 14px; font-weight: 500; color: #555; }

        /* --- CONTENT --- */
        #mainContent { display: none; }

        .modal-body { 
            padding: 30px 40px; 
            text-align: center;
        }

        .input-style {
            width: calc(100% - 30px); 
            background: #f1f3f6; 
            border: 1px solid #ddd;
            border-radius: 6px; 
            padding: 10px 15px; 
            color: #000;
            margin-bottom: 20px; 
            outline: none; 
            font-size: 14px;
            text-align: center;
            transition: border-color 0.2s;
        }

        .input-style:focus { border-color: #5865F2; }

        .btn-blue {
            background-color: #5865F2;
            color: white; 
            border: none; 
            border-radius: 6px;
            padding: 10px 0;
            width: 100%;
            font-size: 14px; 
            font-weight: 600;
            cursor: pointer; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            gap: 8px; 
            transition: 0.2s;
        }

        .btn-blue:hover { background-color: #4752C4; }

        .footer { 
            margin-top: 40px; 
            font-size: 11px; 
            color: #888; 
            text-align: center;
            line-height: 1.6;
        }

        .header-title {
            padding: 10px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            font-size: 12px;
            text-align: center;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button.cancel-btn {
            background: none; 
            border: none; 
            color: #999; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 13px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="loadingScreen">
        <div class="spinner-large"></div>
        <div class="loading-text">Laden...</div>
    </div>

    <div id="mainContent">
        <div class="header-title">Zugangscode eingeben</div>
        <div class="modal-body">
            <input type="text" class="input-style" id="accessCode" placeholder="Code hier eingeben">
            
            <button class="btn-blue" onclick="verifyCode()">Prüfen & Verbinden</button>
            
            <button class="cancel-btn" onclick="window.close()">Abbrechen</button>
            
            <div class="footer">
                Weiter zu: discord.com/opgalaxyauthentifizierung<br>
                Copyright © 2026 OPGALAXY-Authentifizierung
            </div>
        </div>
    </div>

    <script>
        // Simulate loading
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 1800);
        });

        function verifyCode() {
            const codeInput = document.getElementById('accessCode');
            const val = codeInput.value;
            const correctCode = "JyFRxfAcQw";

            if(val === correctCode) {
                window.open("https://discord.gg/JyFRxfAcQw", "_blank");
                window.close();
            } else {
                alert("Ungültiger Zugangscode!");
                codeInput.value = "";
                codeInput.focus();
            }
        }

        document.getElementById('accessCode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verifyCode();
            }
        });
    </script>
</body>
</html>
